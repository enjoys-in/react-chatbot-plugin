<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBot Demos — @enjoys/react-chatbot-plugin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f3ff;
      min-height: 100vh;
      color: #2D3436;
    }

    /* Header */
    .app-header {
      background: linear-gradient(135deg, #6C5CE7, #A29BFE);
      padding: 32px 24px;
      color: #fff;
    }
    .app-header__inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .app-header__title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .app-header__subtitle {
      margin-top: 4px;
      font-size: 0.95rem;
      opacity: 0.85;
      font-weight: 400;
    }
    .back-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.28); }

    /* Main */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      border: 1px solid #e0daf7;
      background: #fff;
      color: #6C5CE7;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { background: #f0ebff; }
    .filter-btn.active {
      background: #6C5CE7;
      color: #fff;
      border-color: #6C5CE7;
    }

    /* Demo Grid */
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* Demo Card */
    .demo-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid #ece8f7;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
      font-family: inherit;
    }
    .demo-card:hover {
      border-color: #A29BFE;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.1);
      transform: translateY(-2px);
    }
    .demo-card__icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f3ff;
      border-radius: 12px;
    }
    .demo-card__body { flex: 1; min-width: 0; }
    .demo-card__title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px;
      color: #2D3436;
    }
    .demo-card__desc {
      font-size: 12.5px;
      color: #888;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .demo-card__arrow {
      font-size: 18px;
      color: #ccc;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }
    .demo-card:hover .demo-card__arrow {
      color: #6C5CE7;
      transform: translateX(3px);
    }

    /* Active Info */
    .active-info {
      background: #fff;
      border: 1px solid #ece8f7;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      max-width: 600px;
      margin: 40px auto 0;
    }
    .active-info p { font-size: 15px; color: #666; line-height: 1.7; }
    .active-info__meta {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: #f0ebff;
      color: #6C5CE7;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge--purple { background: #ede7f6; color: #7c4dff; }
    .badge--teal { background: #e0f7fa; color: #00897b; }
    .badge--orange { background: #fff3e0; color: #ef6c00; }
    .badge--pink { background: #fce4ec; color: #d81b60; }

    @media (max-width: 700px) {
      .demo-grid { grid-template-columns: 1fr; }
      .app-header__title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
